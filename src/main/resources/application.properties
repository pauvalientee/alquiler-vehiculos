spring.application.name=alquiler-vehiculos

# Modo de conexión a la BD (Ella suele ańadir este comentario)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/proyectofinal_damb
spring.datasource.username=root
spring.datasource.password=root

# Configuración Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Ruta base de la API (Estilo exacto PDF Restaurante/User)
spring.data.rest.base-path=api